<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Box</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:400px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
    text-align:center;
}

h1{
    color:#1a73e8;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#1a73e8;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1558b0;
}
</style>

</head>
<body>

<div class="container">

<h1>Search</h1>

<form action="https://formspree.io/f/mqerkeda" method="POST">

<input
type="text"
name="Search Query"
placeholder="Type your search..."
required>

<button type="submit">
Search
</button>

</form>

</div>

</body>
</html>
