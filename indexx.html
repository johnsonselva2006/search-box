<!DOCTYPE html>
<html>
<head>
<title>Search Box</title>
<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f2f2f2;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
width:350px;
}

input{
width:100%;
padding:10px;
margin-top:15px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:blue;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Search</h1>

<form action="https://formspree.io/f/mqerkeda" method="POST">

<input
type="text"
name="Search"
placeholder="Enter your search"
required>

<button type="submit">
Search
</button>

</form>

</div>

</body>
</html>
