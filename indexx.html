<!DOCTYPE html>
<html>
<head>
<title>Search Box</title>

<style>

body{
background:#f2f2f2;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.2);
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:15px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#0066ff;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>Search</h1>

<form action="https://formspree.io/f/mqerkeda" method="POST">

<input
type="text"
name="Search Query"
placeholder="Type something..."
required>

<button type="submit">
Search
</button>

</form>

</div>

</body>

</html>
